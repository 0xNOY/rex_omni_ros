[mypy]
python_version = 3.12
; Without this, the rex_omni_msgs interface-definition directories (msg/,
; srv/) at the repository root are mistaken for Python namespace packages.
namespace_packages = False

; ROS client libraries and generated message packages ship no type stubs.
[mypy-rospy.*]
ignore_missing_imports = True

[mypy-rclpy.*]
ignore_missing_imports = True

[mypy-rex_omni_msgs.*]
ignore_missing_imports = True

[mypy-sensor_msgs.*]
ignore_missing_imports = True

[mypy-std_srvs.*]
ignore_missing_imports = True
